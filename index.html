<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SPQR</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #101827 100%);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      width: 100vw;
      height: 100vh;
    }

    .sidebar {
      background: rgba(10, 15, 28, 0.78);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar h2 {
      margin: 0;
      font-size: 16px;
      color: #f8fafc;
    }

    .new-chat-btn {
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .chat-history {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .history-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(31, 41, 55, 0.7);
      color: #f8fafc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
    }

    .main-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      padding: 18px 18px 18px 0;
    }

    .chat-section {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.05), transparent 28%),
        linear-gradient(180deg, rgba(8, 15, 32, 0.96) 0%, rgba(13, 24, 46, 0.98) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 12px 32px rgba(0,0,0,0.22);
    }

    .chat-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: transparent;
    }

    .chatroom {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      margin: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
    }

    .chatroom h3,
    .chatroom .title {
      display: none !important;
    }

    .chatroom,
    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats,
    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats {
      flex: 1 1 auto !important;
      width: 100% !important;
      max-width: none !important;
      min-height: 0 !important;
      overflow-y: auto !important;
      color: #e5e7eb !important;
      padding: 32px 32px 170px !important;
      display: flex !important;
      flex-direction: column !important;
    }

    .chatroom .messages .message,
.chatroom .chatroom__messages .message {
  width: 100% !important;
  margin-bottom: 18px !important;
}

.chatroom .messages .message--bot,
.chatroom .chatroom__messages .message--bot {
  display: flex !important;
  justify-content: flex-start !important;
}

.chatroom .messages .message--user,
.chatroom .chatroom__messages .message--user {
  display: flex !important;
  justify-content: flex-end !important;
}

.chatroom .messages .message--bot .message__text,
.chatroom .chatroom__messages .message--bot .message__text {
  display: inline-block !important;
  width: auto !important;
  background: rgba(24, 34, 53, 0.96) !important;
  color: #f8fafc !important;
  border: 1px solid rgba(255, 255, 255, 0.06) !important;
  border-radius: 18px !important;
  padding: 14px 18px !important;
  max-width: 70% !important;
  line-height: 1.5 !important;
  font-size: 15px !important;
  white-space: normal !important;
  word-break: break-word !important;
  overflow-wrap: break-word !important;
}

.chatroom .messages .message--user .message__text,
.chatroom .chatroom__messages .message--user .message__text {
  display: inline-block !important;
  width: auto !important;
  background: #2563eb !important;
  color: #ffffff !important;
  border: none !important;
  border-radius: 18px !important;
  padding: 14px 18px !important;
  max-width: 70% !important;
  line-height: 1.5 !important;
  font-size: 15px !important;
  white-space: normal !important;
  word-break: break-word !important;
  overflow-wrap: break-word !important;
}
    .quick-actions {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 104px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      width: min(900px, calc(100% - 40px));
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .quick-actions button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(31, 41, 55, 0.72);
      color: #f8fafc;
      backdrop-filter: blur(6px);
    }

    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 12px !important;
      position: absolute !important;
      left: 50%;
      transform: translateX(-50%);
      bottom: 28px;
      width: min(760px, calc(100% - 40px)) !important;
      max-width: 760px !important;
      padding: 0 !important;
      z-index: 25;
    }

    .chatroom input:not([type="submit"]),
    .chatroom textarea {
      flex: 1 1 auto !important;
      width: 100% !important;
      min-width: 0 !important;
      min-height: 58px !important;
      height: 58px !important;
      resize: none !important;
      background: rgba(12, 20, 36, 0.98) !important;
      color: #f8fafc !important;
      border: 1px solid rgba(148, 163, 184, 0.18) !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      font-size: 15px !important;
      outline: none !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18) !important;
    }

    .chatroom button {
      flex: 0 0 auto !important;
      width: 58px !important;
      min-width: 58px !important;
      height: 58px !important;
      border: none !important;
      border-radius: 16px !important;
      background: #2563eb !important;
      color: transparent !important;
      cursor: pointer;
      position: relative !important;
      font-size: 0 !important;
      overflow: hidden !important;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.22) !important;
    }

    .chatroom button::before {
      content: "🎤";
      font-size: 20px;
      color: #ffffff;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Send-Button mit → ── */
    .chatroom input[type="submit"] {
      flex: 0 0 auto !important;
      width: 58px !important;
      min-width: 58px !important;
      height: 58px !important;
      border: none !important;
      border-radius: 16px !important;
      background: #2563eb !important;
      color: transparent !important;
      cursor: pointer;
      position: relative !important;
      font-size: 0 !important;
      text-indent: -9999px !important;
      overflow: hidden !important;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.22) !important;
    }

    .chatroom input[type="submit"]::before {
      content: "";
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-indent: 0;
    }

    .welcome-screen {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 30%),
        linear-gradient(180deg, rgba(11,16,32,0.96) 0%, rgba(16,24,39,0.96) 100%);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .welcome-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main-panel { padding: 14px; }

      .chatroom__messages,
      .chatroom .messages,
      .chatroom .chats {
        padding: 20px 16px 180px !important;
      }

      .quick-actions {
        width: calc(100% - 24px);
        bottom: 106px;
      }

      .chatroom form,
      .chatroom .input,
      .chatroom .chatroom__input {
        width: calc(100% - 24px) !important;
        bottom: 16px;
      }

      .chatroom .messages .message--bot .message__text,
      .chatroom .messages .message--user .message__text,
      .chatroom .chatroom__messages .message--bot .message__text,
      .chatroom .chatroom__messages .message--user .message__text {
        max-width: 88% !important;
      }
    }

    /* ===== HARTE OVERRIDES FÜR CHATROOM LAYOUT ===== */

    .chat-container {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: block !important;
    }

    .chat-container > div,
    .chat-container .chatroom,
    .chat-container [class*="chatroom"] {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      min-width: 0 !important;
      margin: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    .chat-container,
    .chatroom,
    .chatroom * {
      box-sizing: border-box !important;
    }

    .chatroom {
      display: flex !important;
      flex-direction: column !important;
      justify-content: flex-start !important;
      align-items: stretch !important;
      overflow: hidden !important;
    }

    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats,
    .chatroom [class*="messages"] {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 140px !important;
      width: 100% !important;
      max-width: none !important;
      padding: 28px 32px !important;
      overflow-y: auto !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 14px !important;
    }

    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input,
    .chatroom [class*="input"] {
      position: absolute !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      bottom: 24px !important;
      width: min(760px, calc(100% - 48px)) !important;
      max-width: 760px !important;
      display: flex !important;
      align-items: center !important;
      gap: 12px !important;
      padding: 0 !important;
      margin: 0 !important;
      z-index: 40 !important;
      background: transparent !important;
    }

    .chatroom input:not([type="submit"]),
    .chatroom textarea {
      flex: 1 1 auto !important;
      width: 100% !important;
      height: 58px !important;
      min-height: 58px !important;
      background: rgba(12, 20, 36, 0.98) !important;
      color: #fff !important;
      border: 1px solid rgba(148, 163, 184, 0.18) !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      font-size: 15px !important;
      outline: none !important;
    }

    .chatroom input[type="submit"] {
      width: 58px !important;
      min-width: 58px !important;
      height: 58px !important;
      border: none !important;
      border-radius: 16px !important;
      background: #2563eb !important;
      color: transparent !important;
      position: relative !important;
      text-indent: -9999px !important;
      overflow: hidden !important;
    }

    .chatroom input[type="submit"]::before {
      content: "+";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-indent: 0;
    }

    .chatroom button {
      width: 58px !important;
      min-width: 58px !important;
      height: 58px !important;
      border: none !important;
      border-radius: 16px !important;
      background: #2563eb !important;
      color: transparent !important;
      position: relative !important;
      overflow: hidden !important;
    }

    .chatroom button::before {
      content: "🎤";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
    }

    .quick-actions {
      position: absolute !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      bottom: 98px !important;
      width: min(900px, calc(100% - 48px)) !important;
      display: flex !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 10px !important;
      z-index: 30 !important;
    }

    .chatroom .message--bot,
    .chatroom .message--user,
    .chatroom .message {
      width: 100% !important;
      display: flex !important;
    }

    .chatroom .message--bot {
      justify-content: flex-start !important;
    }

    .chatroom .message--user {
      justify-content: flex-end !important;
    }

   /* Bot: dynamisch ohne Bubble */
.chatroom .message--bot .message__text {
  display: inline-block !important;
  width: fit-content !important;
  max-width: min(820px, 88%) !important;
  background: transparent !important;
  color: #e5e7eb !important;
  border: none !important;
  border-radius: 0 !important;
  padding: 4px 0 !important;
  box-shadow: none !important;
  line-height: 1.6 !important;
  font-size: 15px !important;
  height: auto !important;
  min-height: unset !important;
  white-space: pre-wrap !important;
  word-break: break-word !important;
  overflow-wrap: break-word !important;
}

/* Nutzer: Bubble wirklich dynamisch */
.chatroom .message--user .message__text {
  display: inline-block !important;
  width: fit-content !important;
  max-width: min(820px, 72%) !important;
  background: #2563eb !important;
  color: #fff !important;
  border: none !important;
  border-radius: 18px !important;
  padding: 12px 18px !important;
  height: auto !important;
  min-height: unset !important;
  white-space: pre-wrap !important;
  word-break: break-word !important;
  overflow-wrap: break-word !important;
}
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h2>Vorherige Chats</h2>
      <button class="new-chat-btn" onclick="resetChat()">+ Neuer Chat</button>
      <div class="chat-history" id="chatHistory">
        <button class="history-item">Salve</button>
        <button class="history-item">Wer bist du?</button>
        <button class="history-item">Was kannst du?</button>
      </div>
    </aside>

    <main class="main-panel">
      <div class="chat-section">
        <div class="chat-container"></div>

        <div class="quick-actions">
          <button onclick="sendMsg('hello')">Hallo</button>
          <button onclick="sendMsg('help')">Hilfe</button>
          <button onclick="sendMsg('who are you')">Wer bist du?</button>
          <button onclick="sendMsg('what can you do')">Was kannst du?</button>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
          <h1>STYX</h1>
          <p>Halt dein Maul und frag einfach.</p>
          <button onclick="hideWelcome()">Chat starten</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>
  <script>
    const chatroom = new window.Chatroom({
      host: "https://shiny-waddle-97ppvpwpxj6xfx6qj-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      speechRecognition: "de-DE",
      voiceLang: "de-DE"
    });

    chatroom.openChat();

    // Placeholder ins Eingabefeld setzen (wird nach DOM-Aufbau injiziert)
    function setPlaceholder() {
      const input =
        document.querySelector(".chatroom input:not([type='submit'])") ||
        document.querySelector(".chatroom textarea");
      if (input) {
        input.placeholder = "Bitte stelle deine Fragen1";
      } else {
        setTimeout(setPlaceholder, 200);
      }
    }
    setTimeout(setPlaceholder, 300);

    function hideWelcome() {
      document.getElementById("welcomeScreen").classList.add("hidden");
    }

    function resetChat() {
      location.reload();
    }

    function sendMsg(text) {
      hideWelcome();

      const trySend = () => {
        const input =
          document.querySelector(".chatroom input:not([type='submit'])") ||
          document.querySelector(".chatroom textarea");

        const submitButton =
          document.querySelector('.chatroom input[type="submit"]');

        if (input && submitButton) {
          input.value = text;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          submitButton.click();
        }
      };

      setTimeout(trySend, 250);
    }

    document.addEventListener("click", function (e) {
      if (
        e.target.closest(".chatroom input[type='submit']") ||
        e.target.closest(".chatroom button") ||
        e.target.closest(".quick-actions button")
      ) {
        hideWelcome();
      }
    });
  </script>
</body>
</html>
