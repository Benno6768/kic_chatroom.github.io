<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Die Wahrheit</title>

  <!-- Chatroom styles via jsDelivr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

<style>
  body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
  }

  .app-wrapper {
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .header-box {
    text-align: center;
    color: white;
    padding: 15px;
    background: rgba(0,0,0,0.3);
  }

  .chat-container {
    flex: 1;
    width: 100%;
  }

  .chatroom {
    height: 100% !important;
    width: 100% !important;
    border-radius: 0 !important;
    box-shadow: none !important;
  }

  .chatroom__messages {
    background: #f8fafc !important;
  }

  .quick-actions {
    display: flex;
    gap: 10px;
    padding: 10px;
    justify-content: center;
    background: rgba(0,0,0,0.3);
  }

  .quick-actions button {
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    background: white;
    color: #0f172a;
  }
</style>
</head>
<body>
<div class="app-wrapper">
  <div class="header-box">
    <h1>Die Wahrheit</h1>
    <p>Stelle eine Frage und finde heraus, was der Bot dir antwortet.</p>
  </div>

  <div class="chat-container"></div>

  <div class="quick-actions">
    <button onclick="sendMsg('hello')">Hallo</button>
    <button onclick="sendMsg('help')">Hilfe</button>
    <button onclick="sendMsg('who are you')">Wer bist du?</button>
  </div>
</div>
      <button onclick="sendMsg('what can you do')">Was kannst du?</button>
    </div>

    <div class="footer-note">
      Tipp: Nutze die Buttons oder schreibe direkt in den Chat.
    </div>
  </div>

  <!-- Chatroom script via jsDelivr -->
  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    if (!window.Chatroom) {
      document.body.insertAdjacentHTML(
        "beforeend",
        '<div style="padding:12px;color:#fff;background:#c00">Could not load Chatroom.js</div>'
      );
    }

    const chatroom = new window.Chatroom({
      host: "https://shiny-waddle-97ppvpwpxj6xfx6qj-5005.app.github.dev",
      title: "Die Wahrheit",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Hallo. Ich bin Die Wahrheit. Stelle mir eine Frage oder nutze die Schnellaktionen unter dem Chat.",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();

    function sendMsg(text) {
      const trySend = () => {
        const input =
          document.querySelector('input') ||
          document.querySelector('.chatroom input') ||
          document.querySelector('textarea');

        const submitButton =
          document.querySelector('button[type="submit"]') ||
          document.querySelector('.chatroom__input button') ||
          document.querySelector('.chatroom button');

        if (input && submitButton) {
          input.value = text;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          submitButton.click();
        } else {
          console.log("Eingabefeld oder Senden-Button noch nicht gefunden.");
        }
      };

      setTimeout(trySend, 300);
    }
  </script>
</body>
</html>
