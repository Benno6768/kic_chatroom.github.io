<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SPQR</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #101827 100%);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      width: 100vw;
      height: 100vh;
    }

    .sidebar {
      background: rgba(10, 15, 28, 0.78);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar h2 {
      margin: 0;
      font-size: 16px;
      color: #f8fafc;
    }

    .new-chat-btn {
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .new-chat-btn:hover {
      background: #1d4ed8;
    }

    .chat-history {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .history-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(31, 41, 55, 0.7);
      color: #f8fafc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
    }

    .history-item:hover {
      background: rgba(55, 65, 81, 0.9);
    }

    .main-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      padding: 18px 18px 18px 0;
    }

    /* EIN großes Chat-Fenster */
    .chat-section {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(8, 15, 32, 0.88) 0%, rgba(13, 24, 46, 0.9) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 12px 32px rgba(0,0,0,0.22);
    }

    .chat-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: transparent;
    }

    .chatroom {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
    }

    .chatroom h3,
    .chatroom .title {
      display: none !important;
    }

    .chatroom,
    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats,
    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* Nachrichtenfläche */
    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      overflow-y: auto !important;
      color: #e5e7eb !important;
      padding: 26px 28px 150px !important;
    }

    .chatroom .messages .message,
    .chatroom .chatroom__messages .message {
      margin-bottom: 18px !important;
    }

    .chatroom .messages .message--bot .message__text,
    .chatroom .chatroom__messages .message .message__text,
    .chatroom .messages .message:nth-child(odd) .message__text {
      background: #182235 !important;
      color: #f8fafc !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      max-width: 780px !important;
      line-height: 1.5 !important;
      font-size: 15px !important;
    }

    .chatroom .messages .message--user .message__text {
      background: #2563eb !important;
      color: #ffffff !important;
      border: none !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      max-width: 780px !important;
      line-height: 1.5 !important;
      font-size: 15px !important;
    }

    .chatroom .messages .message .message__meta,
    .chatroom small,
    .chatroom time {
      color: #94a3b8 !important;
      font-size: 12px !important;
      margin-top: 6px !important;
    }

    /* Schnellaktionen IM selben Fenster */
    .quick-actions {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 86px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-start;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .quick-actions button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(31, 41, 55, 0.72);
      color: #f8fafc;
      transition: background 0.15s ease, transform 0.15s ease;
      backdrop-filter: blur(6px);
    }

    .quick-actions button:hover {
      background: rgba(55, 65, 81, 0.88);
      transform: translateY(-1px);
    }

    /* Eingabebereich ebenfalls IM selben Fenster */
    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      position: absolute !important;
      left: 28px;
      right: 28px;
      bottom: 22px;
      width: auto !important;
      padding: 0 !important;
      z-index: 25;
      backdrop-filter: none !important;
    }

    .chatroom input,
    .chatroom textarea {
      flex: 1 1 auto !important;
      width: 100% !important;
      min-width: 0 !important;
      min-height: 54px !important;
      background: rgba(12, 20, 36, 0.96) !important;
      color: #f8fafc !important;
      border: 1px solid rgba(148, 163, 184, 0.18) !important;
      border-radius: 18px !important;
      padding: 14px 16px !important;
      font-size: 15px !important;
      outline: none !important;
      box-shadow: none !important;
    }

    .chatroom input::placeholder,
    .chatroom textarea::placeholder {
      color: #94a3b8 !important;
    }

    /* Sendebutton mit sichtbarem Pfeil */
    .chatroom input[type="submit"] {
      flex: 0 0 auto !important;
      width: 50px !important;
      min-width: 50px !important;
      height: 50px !important;
      border: none !important;
      border-radius: 14px !important;
      background: #2563eb !important;
      color: transparent !important;
      cursor: pointer;
      position: relative !important;
      font-size: 0 !important;
      text-indent: -9999px !important;
      overflow: hidden !important;
    }

    .chatroom input[type="submit"]::before {
      content: "➜";
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-indent: 0;
    }

    /* Mikrofonbutton */
    .chatroom button {
      flex: 0 0 auto !important;
      width: 50px !important;
      min-width: 50px !important;
      height: 50px !important;
      border: none !important;
      border-radius: 14px !important;
      background: #2563eb !important;
      color: transparent !important;
      cursor: pointer;
      position: relative !important;
      font-size: 0 !important;
      overflow: hidden !important;
    }

    .chatroom button::before {
      content: "🎤";
      font-size: 18px;
      color: #ffffff;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chatroom button:hover,
    .chatroom input[type="submit"]:hover {
      background: #1d4ed8 !important;
    }

    /* Startscreen */
    .welcome-screen {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 30%),
        linear-gradient(180deg, rgba(11,16,32,0.96) 0%, rgba(16,24,39,0.96) 100%);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .welcome-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .welcome-screen h1 {
      margin: 0 0 12px;
      font-size: 44px;
      color: #f8fafc;
    }

    .welcome-screen p {
      margin: 0 0 22px;
      font-size: 18px;
      color: #94a3b8;
    }

    .welcome-screen button {
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .welcome-screen button:hover {
      background: #1d4ed8;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .main-panel {
        padding: 14px;
      }

      .chatroom__messages,
      .chatroom .messages,
      .chatroom .chats {
        padding: 18px 16px 160px !important;
      }

      .quick-actions {
        left: 16px;
        right: 16px;
        bottom: 84px;
      }

      .chatroom form,
      .chatroom .input,
      .chatroom .chatroom__input {
        left: 16px;
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h2>Vorherige Chats</h2>
      <button class="new-chat-btn" onclick="resetChat()">+ Neuer Chat</button>
      <div class="chat-history" id="chatHistory">
        <button class="history-item">Salve</button>
        <button class="history-item">Wer bist du?</button>
        <button class="history-item">Was kannst du?</button>
      </div>
    </aside>

    <main class="main-panel">
      <div class="chat-section">
        <div class="chat-container"></div>

        <div class="quick-actions">
          <button onclick="sendMsg('hello')">Hallo</button>
          <button onclick="sendMsg('help')">Hilfe</button>
          <button onclick="sendMsg('who are you')">Wer bist du?</button>
          <button onclick="sendMsg('what can you do')">Was kannst du?</button>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
          <h1>Senatus Populusque Romanus</h1>
          <p>Halt dein Maul und frag einfach.</p>
          <button onclick="hideWelcome()">Chat starten</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    if (!window.Chatroom) {
      document.body.insertAdjacentHTML(
        "beforeend",
        '<div style="padding:12px;color:#fff;background:#c00">Could not load Chatroom.js</div>'
      );
    }

    const chatroom = new window.Chatroom({
      host: "https://shiny-waddle-97ppvpwpxj6xfx6qj-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Salve. Stelle eine Frage oder nutze die Schnellaktionen.",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();

    function hideWelcome() {
      document.getElementById("welcomeScreen").classList.add("hidden");
    }

    function resetChat() {
      location.reload();
    }

    function sendMsg(text) {
      hideWelcome();

      const trySend = () => {
        const input =
          document.querySelector(".chatroom input") ||
          document.querySelector("input") ||
          document.querySelector(".chatroom textarea") ||
          document.querySelector("textarea");

        const submitButton =
          document.querySelector('.chatroom input[type="submit"]') ||
          document.querySelector('input[type="submit"]');

        if (input && submitButton) {
          input.value = text;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          submitButton.click();
        } else {
          console.log("Eingabefeld oder Senden-Button noch nicht gefunden.");
        }
      };

      setTimeout(trySend, 250);
    }

    document.addEventListener("click", function (e) {
      if (
        e.target.closest(".chatroom input[type='submit']") ||
        e.target.closest(".chatroom button") ||
        e.target.closest(".quick-actions button")
      ) {
        hideWelcome();
      }
    });
  </script>
</body>
</html>
