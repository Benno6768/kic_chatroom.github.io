<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SPQR</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #101827 100%);
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }

    .topbar {
      flex: 0 0 auto;
      padding: 18px 24px 10px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
    }

    .topbar p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .chat-section {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
      position: relative;
    }

    .chat-container {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      overflow: hidden;
      background: transparent;
    }

    .chatroom {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
    }

    .chatroom h3,
    .chatroom .title {
      display: none !important;
    }

    .chatroom,
    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats,
    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input,
    .quick-actions {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      overflow-y: auto !important;
      color: #e5e7eb !important;
      padding: 18px 24px 120px !important;
    }

    .chatroom .messages .message,
    .chatroom .chatroom__messages .message {
      margin-bottom: 18px !important;
    }

    .chatroom .messages .message--bot .message__text,
    .chatroom .chatroom__messages .message .message__text,
    .chatroom .messages .message:nth-child(odd) .message__text {
      background: #1a2334 !important;
      color: #f8fafc !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      max-width: 780px !important;
      line-height: 1.5 !important;
      font-size: 15px !important;
    }

    .chatroom .messages .message--user .message__text {
      background: #2563eb !important;
      color: #ffffff !important;
      border: none !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      max-width: 780px !important;
      line-height: 1.5 !important;
      font-size: 15px !important;
    }

    .chatroom .messages .message .message__meta,
    .chatroom small,
    .chatroom time {
      color: #94a3b8 !important;
      font-size: 12px !important;
      margin-top: 6px !important;
    }

    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      width: 100% !important;
      padding: 12px 24px 10px !important;
      position: absolute !important;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    .chatroom input,
    .chatroom textarea {
      flex: 1 1 auto !important;
      width: 100% !important;
      min-width: 0 !important;
      min-height: 52px !important;
      background: rgba(17, 24, 39, 0.9) !important;
      color: #f8fafc !important;
      border: 1px solid rgba(148, 163, 184, 0.22) !important;
      border-radius: 18px !important;
      padding: 14px 16px !important;
      font-size: 15px !important;
      outline: none !important;
      box-shadow: none !important;
    }

    .chatroom input::placeholder,
    .chatroom textarea::placeholder {
      color: #94a3b8 !important;
    }

    .chatroom button,
    .chatroom input[type="submit"] {
      flex: 0 0 auto !important;
      width: 46px !important;
      min-width: 46px !important;
      height: 46px !important;
      padding: 0 !important;
      border: none !important;
      border-radius: 12px !important;
      background: #2563eb !important;
      color: transparent !important;
      cursor: pointer;
      position: relative;
      box-shadow: none !important;
    }

    .chatroom input[type="submit"]::before {
      content: "➜";
      color: #ffffff;
      font-size: 18px;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chatroom button::before {
      content: "🎤";
      font-size: 18px;
      line-height: 1;
      color: #ffffff;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chatroom button:hover,
    .chatroom input[type="submit"]:hover {
      background: #1d4ed8 !important;
    }

    .quick-actions {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 72px;
      z-index: 15;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-start;
      pointer-events: auto;
    }

    .quick-actions button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(31, 41, 55, 0.75);
      color: #f8fafc;
      transition: background 0.15s ease, transform 0.15s ease;
      backdrop-filter: blur(6px);
    }

    .quick-actions button:hover {
      background: rgba(55, 65, 81, 0.9);
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 16px 16px 8px;
      }

      .topbar h1 {
        font-size: 18px;
      }

      .topbar p {
        font-size: 13px;
      }

      .chatroom__messages,
      .chatroom .messages,
      .chatroom .chats {
        padding: 14px 16px 130px !important;
      }

      .chatroom form,
      .chatroom .input,
      .chatroom .chatroom__input {
        padding: 10px 16px 8px !important;
      }

      .quick-actions {
        left: 16px;
        right: 16px;
        bottom: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <h1>Senatus Populusque Romanus</h1>
      <p>Halt dein Maul und frag einfach.</p>
    </div>

    <div class="chat-section">
      <div class="chat-container"></div>

      <div class="quick-actions">
        <button onclick="sendMsg('hello')">Hallo</button>
        <button onclick="sendMsg('help')">Hilfe</button>
        <button onclick="sendMsg('who are you')">Wer bist du?</button>
        <button onclick="sendMsg('what can you do')">Was kannst du?</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    if (!window.Chatroom) {
      document.body.insertAdjacentHTML(
        "beforeend",
        '<div style="padding:12px;color:#fff;background:#c00">Could not load Chatroom.js</div>'
      );
    }

    const chatroom = new window.Chatroom({
      host: "https://shiny-waddle-97ppvpwpxj6xfx6qj-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Salve. Stelle eine Frage oder nutze die Schnellaktionen.",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();

    function sendMsg(text) {
      const trySend = () => {
        const input =
          document.querySelector(".chatroom input") ||
          document.querySelector("input") ||
          document.querySelector(".chatroom textarea") ||
          document.querySelector("textarea");

        const submitButton =
          document.querySelector('.chatroom input[type="submit"]') ||
          document.querySelector('input[type="submit"]');

        if (input && submitButton) {
          input.value = text;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          submitButton.click();
        } else {
          console.log("Eingabefeld oder Senden-Button noch nicht gefunden.");
        }
      };

      setTimeout(trySend, 250);
    }
  </script>
</body>
</html>
