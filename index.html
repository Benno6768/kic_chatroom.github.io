<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SPQR</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.10), transparent 28%),
        linear-gradient(180deg, #0b1020 0%, #111827 100%);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      width: 100vw;
      height: 100vh;
    }

    .sidebar {
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(6, 10, 20, 0.95);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 18px;
      color: #f8fafc;
    }

    .sidebar-header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #94a3b8;
    }

    .new-chat-btn {
      margin-top: 14px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #1d4ed8;
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .new-chat-btn:hover {
      opacity: 0.95;
    }

    .chat-history {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 12px;
    }

    .chat-history-item {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #111827;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .chat-history-item:hover {
      background: #1f2937;
      transform: translateY(-1px);
    }

    .chat-history-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f8fafc;
    }

    .chat-history-preview {
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      flex: 0 0 auto;
      padding: 18px 24px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(10, 15, 28, 0.92);
      backdrop-filter: blur(10px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
    }

    .topbar p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .chat-section {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-container {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      overflow: hidden;
    }

    .chatroom {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
    }

    /* internen Titel ausblenden */
    .chatroom h3,
    .chatroom .title {
      display: none !important;
    }

    /* Nachrichtenbereich */
    .chatroom__messages,
    .chatroom .messages,
    .chatroom .chats {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      overflow-y: auto !important;
      background: transparent !important;
      color: #e5e7eb !important;
      padding: 28px 32px 12px !important;
    }

    /* Bot-/User-Bubbles moderner */
    .chatroom .messages .message,
    .chatroom .chatroom__messages .message {
      margin-bottom: 18px !important;
    }

    .chatroom .messages .message--bot .message__text,
    .chatroom .chatroom__messages .message .message__text,
    .chatroom .messages .message:nth-child(odd) .message__text {
      background: #1f2937 !important;
      color: #f8fafc !important;
      border: 1px solid rgba(255, 255, 255, 0.06) !important;
      border-radius: 18px !important;
      box-shadow: none !important;
      padding: 14px 18px !important;
      max-width: 780px !important;
      line-height: 1.5 !important;
      font-size: 15px !important;
    }

    .chatroom .messages .message--user .message__text {
      background: #2563eb !important;
      color: #ffffff !important;
      border: none !important;
      border-radius: 18px !important;
      padding: 14px 18px !important;
      max-width: 780px !important;
      line-height: 1.5 !important;
      font-size: 15px !important;
    }

    .chatroom .messages .message .message__meta,
    .chatroom small,
    .chatroom time {
      color: #94a3b8 !important;
      font-size: 12px !important;
      margin-top: 6px !important;
    }

    /* Input-Bereich wie ChatGPT-artig */
    .chatroom form,
    .chatroom .input,
    .chatroom .chatroom__input {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      width: 100% !important;
      padding: 16px 24px !important;
      background: rgba(11, 16, 32, 0.98) !important;
      border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
    }

    .chatroom input,
    .chatroom textarea {
      flex: 1 1 auto !important;
      width: 100% !important;
      min-width: 0 !important;
      background: #111827 !important;
      color: #f8fafc !important;
      border: 1px solid #334155 !important;
      border-radius: 18px !important;
      padding: 14px 16px !important;
      font-size: 15px !important;
      outline: none !important;
      box-shadow: none !important;
      min-height: 52px !important;
    }

    .chatroom input::placeholder,
    .chatroom textarea::placeholder {
      color: #94a3b8 !important;
    }

    /* Kleiner Button rechts */
    .chatroom button,
    .chatroom input[type="submit"] {
      flex: 0 0 auto !important;
      width: 46px !important;
      min-width: 46px !important;
      height: 46px !important;
      padding: 0 !important;
      border: none !important;
      border-radius: 12px !important;
      background: #2563eb !important;
      color: transparent !important;
      cursor: pointer;
      position: relative;
      box-shadow: none !important;
    }

    .chatroom button::before,
    .chatroom input[type="submit"]::before {
      content: "➜";
      color: #ffffff;
      font-size: 18px;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chatroom button:hover,
    .chatroom input[type="submit"]:hover {
      background: #1d4ed8 !important;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 24px 18px;
      background: rgba(11, 16, 32, 0.98);
      justify-content: flex-start;
      border-top: 0;
    }

    .quick-actions button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #1f2937;
      color: #f8fafc;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .quick-actions button:hover {
      background: #374151;
      transform: translateY(-1px);
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .topbar {
        padding: 16px 18px 14px;
      }

      .topbar h1 {
        font-size: 20px;
      }

      .topbar p {
        font-size: 13px;
      }

      .chatroom__messages,
      .chatroom .messages,
      .chatroom .chats {
        padding: 18px 16px 10px !important;
      }

      .chatroom form,
      .chatroom .input,
      .chatroom .chatroom__input {
        padding: 14px 16px !important;
      }

      .quick-actions {
        padding: 0 16px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <p>Lokaler Verlauf im Browser</p>
        <button class="new-chat-btn" onclick="startNewChat()">+ Neuer Chat</button>
      </div>
      <div class="chat-history" id="chatHistory"></div>
    </aside>

    <main class="main-panel">
      <div class="topbar">
        <h1>Senatus Populusque Romanus</h1>
        <p>Halt dein Maul und frag einfach.</p>
      </div>

      <div class="chat-section">
        <div class="chat-container"></div>

        <div class="quick-actions">
          <button onclick="sendMsg('hello')">Hallo</button>
          <button onclick="sendMsg('help')">Hilfe</button>
          <button onclick="sendMsg('who are you')">Wer bist du?</button>
          <button onclick="sendMsg('what can you do')">Was kannst du?</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    const STORAGE_KEY = "spqr_chat_history";
    let currentChat = {
      id: Date.now(),
      title: "Neuer Chat",
      preview: "Noch keine Nachricht"
    };

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function renderHistory() {
      const historyEl = document.getElementById("chatHistory");
      const history = loadHistory();

      historyEl.innerHTML = "";

      if (history.length === 0) {
        historyEl.innerHTML = '<div style="color:#94a3b8;font-size:13px;padding:8px 4px;">Noch keine gespeicherten Chats.</div>';
        return;
      }

      history.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "chat-history-item";
        btn.innerHTML = `
          <div class="chat-history-title">${item.title}</div>
          <div class="chat-history-preview">${item.preview}</div>
        `;
        btn.onclick = () => alert("Dieser Eintrag ist aktuell ein lokaler Verlaufshinweis. Für echtes Wiederladen kompletter Chats bräuchte man mehr JS-Logik oder serverseitige Speicherung.");
        historyEl.appendChild(btn);
      });
    }

    function addHistoryEntry(text) {
      const history = loadHistory();
      const cleanText = (text || "").trim();
      if (!cleanText) return;

      const title = cleanText.length > 28 ? cleanText.slice(0, 28) + "..." : cleanText;

      const entry = {
        id: Date.now(),
        title,
        preview: cleanText
      };

      history.unshift(entry);
      saveHistory(history.slice(0, 20));
      renderHistory();
    }

    function startNewChat() {
      location.reload();
    }

    if (!window.Chatroom) {
      document.body.insertAdjacentHTML(
        "beforeend",
        '<div style="padding:12px;color:#fff;background:#c00">Could not load Chatroom.js</div>'
      );
    }

    const chatroom = new window.Chatroom({
      host: "https://shiny-waddle-97ppvpwpxj6xfx6qj-5005.app.github.dev",
      title: "",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Salve. Stelle eine Frage oder nutze die Schnellaktionen.",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();

    function getInputAndButton() {
      const input =
        document.querySelector(".chatroom input") ||
        document.querySelector("input") ||
        document.querySelector(".chatroom textarea") ||
        document.querySelector("textarea");

      const submitButton =
        document.querySelector('.chatroom button[type="submit"]') ||
        document.querySelector('button[type="submit"]') ||
        document.querySelector(".chatroom__input button") ||
        document.querySelector(".chatroom button");

      return { input, submitButton };
    }

    function sendMsg(text) {
      setTimeout(() => {
        const { input, submitButton } = getInputAndButton();

        if (input && submitButton) {
          input.value = text;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          addHistoryEntry(text);
          submitButton.click();
        } else {
          console.log("Eingabefeld oder Senden-Button noch nicht gefunden.");
        }
      }, 250);
    }

    document.addEventListener("click", function (e) {
      const submitLike =
        e.target.closest('.chatroom button') ||
        e.target.closest('button[type="submit"]');

      if (!submitLike) return;

      const { input } = getInputAndButton();
      if (input && input.value.trim()) {
        addHistoryEntry(input.value.trim());
      }
    });

    renderHistory();
  </script>
</body>
</html>
